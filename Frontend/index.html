<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed — SocialApp</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="hidden">
  <div id="alert-container"></div>

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-brand">✦ SocialApp</a>
      <div class="nav-links">
        <a href="index.html" id="nav-feed">Feed</a>
        <a href="profile.html" id="nav-profile">Profile</a>
        <a href="#" id="logout">Logout</a>
      </div>
    </div>
  </nav>

  <div class="page-container">
    <!-- Create Post -->
    <div class="create-post-card" id="create-post-card">
      <div class="create-post-header">
        <div id="create-post-avatar"></div>
        <textarea id="post-content" placeholder="What's on your mind?" rows="3"></textarea>
      </div>
      <div class="create-post-divider"></div>
      <div class="create-post-footer">
        <button class="btn btn-primary" id="submit-post-btn">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Post
        </button>
      </div>
    </div>

    <!-- Feed -->
    <div class="section-header">
      <h2 class="section-title">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Global Feed
      </h2>
    </div>

    <div id="feed-container">
      <!-- Skeleton loading -->
      <div class="skeleton-card">
        <div style="display:flex;gap:12px;margin-bottom:14px">
          <div class="skeleton skeleton-avatar"></div>
          <div style="flex:1">
            <div class="skeleton skeleton-line" style="width:140px"></div>
            <div class="skeleton skeleton-line" style="width:80px;margin-top:6px"></div>
          </div>
        </div>
        <div class="skeleton skeleton-line" style="width:100%"></div>
        <div class="skeleton skeleton-line" style="width:80%"></div>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/feed.js"></script>
</body>
</html>
