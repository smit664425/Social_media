<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — SocialApp</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="hidden">
  <div id="alert-container"></div>

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-brand">✦ SocialApp</a>
      <div class="nav-links">
        <a href="index.html" id="nav-feed">Feed</a>
        <a href="profile.html" id="nav-profile">Profile</a>
        <a href="#" id="logout">Logout</a>
      </div>
    </div>
  </nav>

  <div class="page-container">
    <!-- Profile Card -->
    <div class="profile-card">
      <div class="profile-cover"></div>
      <div class="profile-info-block">
        <div class="profile-avatar-wrap">
          <div class="profile-avatar-wrapper" id="profile-avatar-container">
            <div class="avatar avatar-c1 avatar-lg">??</div>
          </div>
          <div id="follow-action-container"></div>
        </div>
        <h1 class="profile-username" id="profile-username">Loading...</h1>
        <p class="profile-email" id="profile-email"></p>

        <div class="profile-stats">
          <div class="stat-block">
            <span class="stat-number" id="posts-count">—</span>
            <span class="stat-label">Posts</span>
          </div>
          <div class="stat-block">
            <span class="stat-number" id="followers-count">—</span>
            <span class="stat-label">Followers</span>
          </div>
          <div class="stat-block">
            <span class="stat-number" id="following-count">—</span>
            <span class="stat-label">Following</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Posts Section -->
    <div class="section-header">
      <h2 class="section-title" id="posts-section-title">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Posts
      </h2>
    </div>

    <div id="profile-posts-container">
      <div class="skeleton-card">
        <div style="display:flex;gap:12px;margin-bottom:14px">
          <div class="skeleton skeleton-avatar"></div>
          <div style="flex:1">
            <div class="skeleton skeleton-line" style="width:120px"></div>
            <div class="skeleton skeleton-line" style="width:70px;margin-top:6px"></div>
          </div>
        </div>
        <div class="skeleton skeleton-line" style="width:100%"></div>
        <div class="skeleton skeleton-line" style="width:70%"></div>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
